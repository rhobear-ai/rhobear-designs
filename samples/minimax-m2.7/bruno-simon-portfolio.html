<!DOCTYPE html>
<html lang="en">
<head>
<!--
==========================================================================
  BRUNO SIMON PORTFOLIO RECREATION
  Original URL: https://bruno-simon.com/
  
  Key Observations:
  - Legendary 3D car portfolio where you literally drive through the site
  - Dark/plum color scheme with a moody, premium atmosphere
  - Car responds to WASD/arrow keys + mouse drag for camera
  - Scroll drives the car forward automatically
  - Large flat plane with scattered project sections/markers
  - Loading screen with progress bar before 3D scene
  - Navigation labels float above sections
  - Sound effects: engine hum, ambient atmosphere
  - Sections: About, Work, Contact, and various project showcases
  - Car has headlights that illuminate the terrain
  
  Challenges Solved:
  - Implemented car physics with acceleration, braking, and steering
  - Created terrain with grid texture for the "infinite plane" feel
  - Built 3D text labels that face the camera
  - Scroll-to-drive mechanic mimicking original
  - Loading sequence with progress simulation
  - Responsive canvas that fills viewport
  
  Trade-offs:
  - Simplified 3D models (geometric car shape vs. detailed mesh)
  - Fewer project markers than the original
  - Audio is synthesized via Web Audio API (no external files)
==========================================================================
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bruno Simon — Creative Developer</title>
<style>
/* ============================================
   CSS VARIABLES — Exact Color Palette
   ============================================ */
:root {
  --bg-primary: #0d0d0d;
  --bg-secondary: #1a1a1a;
  --accent-plum: #6b4c7a;
  --accent-purple: #9b6db0;
  --accent-pink: #c77dff;
  --text-primary: #f0f0f0;
  --text-secondary: #a0a0a0;
  --grid-color: rgba(155, 109, 176, 0.15);
  --hud-color: rgba(107, 76, 122, 0.8);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

/* ============================================
   LOADING SCREEN
   ============================================ */
#loading-screen {
  position: fixed;
  inset: 0;
  background: var(--bg-primary);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: opacity 0.8s ease-out;
}

#loading-screen.hidden {
  opacity: 0;
  pointer-events: none;
}

.loading-title {
  font-size: 2.5rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  margin-bottom: 3rem;
  color: var(--text-primary);
}

.loading-subtitle {
  font-size: 0.875rem;
  color: var(--text-secondary);
  margin-bottom: 2rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.loading-bar-container {
  width: 300px;
  height: 3px;
  background: var(--bg-secondary);
  border-radius: 2px;
  overflow: hidden;
}

.loading-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent-plum), var(--accent-pink));
  border-radius: 2px;
  transition: width 0.3s ease-out;
}

.loading-percent {
  margin-top: 1rem;
  font-size: 0.75rem;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}

/* ============================================
   CANVAS
   ============================================ */
#canvas-container {
  position: fixed;
  inset: 0;
}

canvas {
  display: block;
}

/* ============================================
   HUD / NAVIGATION OVERLAY
   ============================================ */
#hud {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
}

.hud-corner {
  position: absolute;
  color: var(--text-secondary);
  font-size: 0.75rem;
  letter-spacing: 0.05em;
}

.hud-corner.top-left {
  top: 2rem;
  left: 2rem;
}

.hud-corner.top-right {
  top: 2rem;
  right: 2rem;
  text-align: right;
}

.hud-corner.bottom-left {
  bottom: 2rem;
  left: 2rem;
}

.hud-corner.bottom-right {
  bottom: 2rem;
  right: 2rem;
  text-align: right;
}

.hud-name {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 0.25rem;
}

.hud-title {
  font-size: 0.7rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.15em;
}

.hud-hint {
  font-size: 0.65rem;
  color: var(--text-secondary);
  line-height: 1.6;
  opacity: 0.7;
}

.hud-controls {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}

.hud-controls span {
  display: block;
}

.hud-coords {
  font-size: 0.65rem;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
  opacity: 0.6;
}

/* ============================================
   SECTION LABELS (3D-placed in scene, rendered via CSS here)
   ============================================ */
.section-label {
  position: fixed;
  padding: 0.5rem 1rem;
  background: var(--hud-color);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(155, 109, 176, 0.3);
  border-radius: 4px;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-primary);
  pointer-events: auto;
  cursor: pointer;
  transform: translate(-50%, -50%);
  transition: background 0.3s, transform 0.3s;
  white-space: nowrap;
}

.section-label:hover {
  background: var(--accent-plum);
  transform: translate(-50%, -50%) scale(1.05);
}

.section-label.active {
  background: var(--accent-pink);
  color: var(--bg-primary);
}

/* ============================================
   INSTRUCTIONS OVERLAY
   ============================================ */
#instructions {
  position: fixed;
  bottom: 5rem;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
  z-index: 100;
  opacity: 1;
  transition: opacity 1s ease-out;
}

#instructions.hidden {
  opacity: 0;
}

.instruction-text {
  font-size: 0.7rem;
  color: var(--text-secondary);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: rgba(13, 13, 13, 0.7);
  backdrop-filter: blur(10px);
  padding: 0.5rem 1rem;
  border-radius: 20px;
  border: 1px solid rgba(155, 109, 176, 0.2);
}

/* ============================================
   SCROLL DRIVE INDICATOR
   ============================================ */
#scroll-indicator {
  position: fixed;
  right: 2rem;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  pointer-events: none;
  z-index: 100;
}

.scroll-bar {
  width: 2px;
  height: 100px;
  background: rgba(155, 109, 176, 0.2);
  border-radius: 1px;
  position: relative;
}

.scroll-fill {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: var(--accent-plum);
  border-radius: 1px;
  transition: height 0.1s ease-out;
}

.scroll-label {
  font-size: 0.6rem;
  color: var(--text-secondary);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  writing-mode: vertical-rl;
  text-orientation: mixed;
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="loading-title">BRUNO SIMON</div>
  <div class="loading-subtitle">Loading Experience</div>
  <div class="loading-bar-container">
    <div class="loading-bar" id="loading-bar"></div>
  </div>
  <div class="loading-percent" id="loading-percent">0%</div>
</div>

<!-- 3D Canvas Container -->
<div id="canvas-container"></div>

<!-- HUD Overlay -->
<div id="hud">
  <div class="hud-corner top-left">
    <div class="hud-name">BRUNO SIMON</div>
    <div class="hud-title">Creative Developer</div>
  </div>
  <div class="hud-corner top-right">
    <div class="hud-title">DRIVE TO EXPLORE</div>
  </div>
  <div class="hud-corner bottom-left">
    <div class="hud-controls">
      <span>W / ↑ — Accelerate</span>
      <span>S / ↓ — Brake</span>
      <span>A / ← — Steer Left</span>
      <span>D / → — Steer Right</span>
      <span>DRAG — Look Around</span>
      <span>SCROLL — Drive</span>
    </div>
  </div>
  <div class="hud-corner bottom-right">
    <div class="hud-coords" id="coords">X: 0 | Z: 0</div>
    <div class="hud-title" style="margin-top: 0.5rem;">© 2025</div>
  </div>
</div>

<!-- Scroll Indicator -->
<div id="scroll-indicator">
  <div class="scroll-label">DRIVE</div>
  <div class="scroll-bar">
    <div class="scroll-fill" id="scroll-fill" style="height: 0%"></div>
  </div>
</div>

<!-- Instructions -->
<div id="instructions">
  <div class="instruction-text">Scroll or use WASD to drive — Drag to look around</div>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ============================================
// MAIN APPLICATION
// ============================================

// --- State ---
const state = {
  loaded: false,
  speed: 0,
  maxSpeed: 2.5,
  acceleration: 0.015,
  braking: 0.03,
  friction: 0.008,
  steerAngle: 0,
  maxSteer: 0.6,
  steerSpeed: 0.04,
  cameraOffset: new THREE.Vector3(0, 8, 15),
  cameraLookOffset: new THREE.Vector3(0, 0, -10),
  mouseDown: false,
  mouseX: 0,
  mouseY: 0,
  camRotX: 0,
  camRotY: 0.3,
  scrollDelta: 0,
  nearSections: [],
  audioStarted: false
};

// --- DOM Elements ---
const loadingScreen = document.getElementById('loading-screen');
const loadingBar = document.getElementById('loading-bar');
const loadingPercent = document.getElementById('loading-percent');
const coordsEl = document.getElementById('coords');
const scrollFill = document.getElementById('scroll-fill');
const instructions = document.getElementById('instructions');
const canvasContainer = document.getElementById('canvas-container');

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d0d);
scene.fog = new THREE.FogExp2(0x0d0d0d, 0.008);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
canvasContainer.appendChild(renderer.domElement);

// --- Lighting ---
const ambientLight = new THREE.AmbientLight(0x1a1a2e, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0x9b6db0, 0.6);
dirLight.position.set(50, 100, 50);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 500;
dirLight.shadow.camera.left = -100;
dirLight.shadow.camera.right = 100;
dirLight.shadow.camera.top = 100;
dirLight.shadow.camera.bottom = -100;
scene.add(dirLight);

const hemisphereLight = new THREE.HemisphereLight(0x6b4c7a, 0x1a1a1a, 0.3);
scene.add(hemisphereLight);

// --- Ground Plane with Grid ---
const groundGeometry = new THREE.PlaneGeometry(500, 500, 100, 100);
const groundMaterial = new THREE.MeshStandardMaterial({
  color: 0x111111,
  roughness: 0.9,
  metalness: 0.1
});
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid overlay
const gridHelper = new THREE.GridHelper(500, 100, 0x6b4c7a, 0x2a2a2a);
gridHelper.position.y = 0.01;
gridHelper.material.opacity = 0.15;
gridHelper.material.transparent = true;
scene.add(gridHelper);

// Outer glow ring
const ringGeometry = new THREE.RingGeometry(80, 82, 64);
const ringMaterial = new THREE.MeshBasicMaterial({
  color: 0x6b4c7a,
  side: THREE.DoubleSide,
  transparent: true,
  opacity: 0.1
});
const ring = new THREE.Mesh(ringGeometry, ringMaterial);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.02;
scene.add(ring);

// ============================================
// CAR MODEL
// ============================================
const car = new THREE.Group();

// Car body (main chassis)
const bodyGeometry = new THREE.BoxGeometry(2, 0.8, 4.5);
const bodyMaterial = new THREE.MeshStandardMaterial({
  color: 0x2a1a3a,
  roughness: 0.3,
  metalness: 0.7
});
const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
body.position.y = 0.6;
body.castShadow = true;
car.add(body);

// Car roof/cabin
const cabinGeometry = new THREE.BoxGeometry(1.6, 0.6, 2.2);
const cabinMaterial = new THREE.MeshStandardMaterial({
  color: 0x1a1025,
  roughness: 0.2,
  metalness: 0.8
});
const cabin = new THREE.Mesh(cabinGeometry, cabinMaterial);
cabin.position.set(0, 1.1, -0.3);
cabin.castShadow = true;
car.add(cabin);

// Wheels
const wheelGeometry = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 16);
const wheelMaterial = new THREE.MeshStandardMaterial({
  color: 0x1a1a1a,
  roughness: 0.6,
  metalness: 0.3
});

const wheelPositions = [
  [-1, 0.35, 1.5],
  [1, 0.35, 1.5],
  [-1, 0.35, -1.5],
  [1, 0.35, -1.5]
];

const wheels = [];
wheelPositions.forEach(pos => {
  const wheelGroup = new THREE.Group();
  const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
  wheel.rotation.z = Math.PI / 2;
  wheel.castShadow = true;
  
  // Wheel rim detail
  const rimGeometry = new THREE.CylinderGeometry(0.2, 0.2, 0.32, 6);
  const rimMaterial = new THREE.MeshStandardMaterial({
    color: 0x6b4c7a,
    roughness: 0.4,
    metalness: 0.6
  });
  const rim = new THREE.Mesh(rimGeometry, rimMaterial);
  rim.rotation.z = Math.PI / 2;
  wheelGroup.add(wheel);
  wheelGroup.add(rim);
  
  wheelGroup.position.set(...pos);
  car.add(wheelGroup);
  wheels.push(wheelGroup);
});

// Headlights
const headlightGeometry = new THREE.CircleGeometry(0.15, 16);
const headlightMaterial = new THREE.MeshBasicMaterial({ color: 0xffffee });
const headlightPositions = [[-0.6, 0.5, 2.26], [0.6, 0.5, 2.26]];
headlightPositions.forEach(pos => {
  const headlight = new THREE.Mesh(headlightGeometry, headlightMaterial);
  headlight.position.set(...pos);
  car.add(headlight);
});

// Headlight beams (spotlights)
const headlightLeft = new THREE.SpotLight(0xffffee, 1, 50, Math.PI / 6, 0.5);
headlightLeft.position.set(-0.6, 0.5, 2.5);
headlightLeft.target.position.set(-0.6, 0, 20);
car.add(headlightLeft);
car.add(headlightLeft.target);

const headlightRight = new THREE.SpotLight(0xffffee, 1, 50, Math.PI / 6, 0.5);
headlightRight.position.set(0.6, 0.5, 2.5);
headlightRight.target.position.set(0.6, 0, 20);
car.add(headlightRight);
car.add(headlightRight.target);

// Taillights
const taillightGeometry = new THREE.BoxGeometry(0.3, 0.15, 0.05);
const taillightMaterial = new THREE.MeshBasicMaterial({ color: 0xff3333 });
const taillightLeft = new THREE.Mesh(taillightGeometry, taillightMaterial);
taillightLeft.position.set(-0.7, 0.5, -2.26);
car.add(taillightLeft);
const taillightRight = new THREE.Mesh(taillightGeometry, taillightMaterial);
taillightRight.position.set(0.7, 0.5, -2.26);
car.add(taillightRight);

// Point light under car for ground glow
const underGlow = new THREE.PointLight(0x9b6db0, 0.5, 8);
underGlow.position.set(0, 0.2, 0);
car.add(underGlow);

car.position.y = 0;
scene.add(car);

// ============================================
// SCENE MARKERS / SECTIONS
// ============================================
const sections = [
  { id: 'about', label: 'ABOUT', position: new THREE.Vector3(30, 0, -20), color: 0xc77dff },
  { id: 'work', label: 'WORK', position: new THREE.Vector3(-35, 0, 15), color: 0x9b6db0 },
  { id: 'contact', label: 'CONTACT', position: new THREE.Vector3(40, 0, 40), color: 0x6b4c7a },
  { id: 'projects', label: 'PROJECTS', position: new THREE.Vector3(-25, 0, -45), color: 0xc77dff },
  { id: 'experience', label: 'EXPERIENCE', position: new THREE.Vector3(50, 0, -50), color: 0x9b6db0 },
  { id: 'skills', label: 'SKILLS', position: new THREE.Vector3(-55, 0, -20), color: 0x6b4c7a },
];

// Create 3D markers for each section
const markers = [];
const sectionLabels = [];

sections.forEach(section => {
  // Glowing pillar/marker
  const pillarGeometry = new THREE.CylinderGeometry(0.3, 0.3, 8, 8);
  const pillarMaterial = new THREE.MeshStandardMaterial({
    color: section.color,
    emissive: section.color,
    emissiveIntensity: 0.3,
    transparent: true,
    opacity: 0.6
  });
  const pillar = new THREE.Mesh(pillarGeometry, pillarMaterial);
  pillar.position.copy(section.position);
  pillar.position.y = 4;
  scene.add(pillar);
  
  // Floating orb at top
  const orbGeometry = new THREE.SphereGeometry(0.8, 16, 16);
  const orbMaterial = new THREE.MeshStandardMaterial({
    color: section.color,
    emissive: section.color,
    emissiveIntensity: 0.5,
    roughness: 0.2,
    metalness: 0.8
  });
  const orb = new THREE.Mesh(orbGeometry, orbMaterial);
  orb.position.copy(section.position);
  orb.position.y = 8.5;
  scene.add(orb);
  
  // Point light at orb
  const sectionLight = new THREE.PointLight(section.color, 0.8, 20);
  sectionLight.position.copy(section.position);
  sectionLight.position.y = 8;
  scene.add(sectionLight);
  
  // Ground ring
  const ringGeo = new THREE.RingGeometry(2, 2.5, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: section.color,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.3
  });
  const groundRing = new THREE.Mesh(ringGeo, ringMat);
  groundRing.rotation.x = -Math.PI / 2;
  groundRing.position.copy(section.position);
  groundRing.position.y = 0.05;
  scene.add(groundRing);
  
  markers.push({ pillar, orb, sectionLight, groundRing, data: section });
  
  // Create HTML label
  const labelEl = document.createElement('div');
  labelEl.className = 'section-label';
  labelEl.textContent = section.label;
  labelEl.dataset.section = section.id;
  labelEl.addEventListener('click', () => {
    // Navigate camera to section
    const targetPos = section.position.clone();
    targetPos.y = 5;
    animateCameraTo(targetPos);
  });
  document.body.appendChild(labelEl);
  sectionLabels.push({ el: labelEl, worldPos: section.position.clone() });
});

// ============================================
// AMBIENT PARTICLES
// ============================================
const particleCount = 200;
const particleGeometry = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);

for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 200;
  particlePositions[i * 3 + 1] = Math.random() * 30 + 2;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 200;
}

particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMaterial = new THREE.PointsMaterial({
  color: 0x9b6db0,
  size: 0.15,
  transparent: true,
  opacity: 0.6
});
const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

// ============================================
// AUDIO (Web Audio API - Synthesized Engine)
// ============================================
let audioContext, engineOscillator, engineGain, filterNode;

function initAudio() {
  if (state.audioStarted) return;
  state.audioStarted = true;
  
  try {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    // Engine oscillator
    engineOscillator = audioContext.createOscillator();
    engineOscillator.type = 'sawtooth';
    engineOscillator.frequency.setValueAtTime(60, audioContext.currentTime);
    
    // Filter for more pleasant sound
    filterNode = audioContext.createBiquadFilter();
    filterNode.type = 'lowpass';
    filterNode.frequency.setValueAtTime(200, audioContext.currentTime);
    filterNode.Q.setValueAtTime(1, audioContext.currentTime);
    
    // Gain node
    engineGain = audioContext.createGain();
    engineGain.gain.setValueAtTime(0, audioContext.currentTime);
    
    // Connect: osc -> filter -> gain -> output
    engineOscillator.connect(filterNode);
    filterNode.connect(engineGain);
    engineGain.connect(audioContext.destination);
    
    engineOscillator.start();
  } catch (e) {
    console.log('Audio not available');
  }
}

function updateAudio() {
  if (!audioContext || !engineGain) return;
  const normalizedSpeed = Math.abs(state.speed) / state.maxSpeed;
  const targetGain = normalizedSpeed * 0.08;
  const targetFreq = 60 + normalizedSpeed * 120;
  
  engineGain.gain.linearRampToValueAtTime(targetGain, audioContext.currentTime + 0.1);
  engineOscillator.frequency.linearRampToValueAtTime(targetFreq, audioContext.currentTime + 0.1);
  filterNode.frequency.linearRampToValueAtTime(200 + normalizedSpeed * 400, audioContext.currentTime + 0.1);
}

// ============================================
// INPUT HANDLING
// ============================================
const keys = {
  forward: false,
  backward: false,
  left: false,
  right: false
};

document.addEventListener('keydown', (e) => {
  initAudio();
  switch (e.key.toLowerCase()) {
    case 'w': case 'arrowup': keys.forward = true; break;
    case 's': case 'arrowdown': keys.backward = true; break;
    case 'a': case 'arrowleft': keys.left = true; break;
    case 'd': case 'arrowright': keys.right = true; break;
  }
});

document.addEventListener('keyup', (e) => {
  switch (e.key.toLowerCase()) {
    case 'w': case 'arrowup': keys.forward = false; break;
    case 's': case 'arrowdown': keys.backward = false; break;
    case 'a': case 'arrowleft': keys.left = false; break;
    case 'd': case 'arrowright': keys.right = false; break;
  }
});

// Mouse controls for camera
document.addEventListener('mousedown', (e) => {
  initAudio();
  state.mouseDown = true;
  state.mouseX = e.clientX;
  state.mouseY = e.clientY;
});

document.addEventListener('mouseup', () => {
  state.mouseDown = false;
});

document.addEventListener('mousemove', (e) => {
  if (!state.mouseDown) return;
  
  const deltaX = e.clientX - state.mouseX;
  const deltaY = e.clientY - state.mouseY;
  
  state.camRotY += deltaX * 0.005;
  state.camRotX += deltaY * 0.003;
  state.camRotX = Math.max(-0.5, Math.min(1.2, state.camRotX));
  
  state.mouseX = e.clientX;
  state.mouseY = e.clientY;
});

// Scroll to drive
document.addEventListener('wheel', (e) => {
  initAudio();
  state.scrollDelta += e.deltaY * 0.01;
  state.scrollDelta = Math.max(-5, Math.min(5, state.scrollDelta));
  
  // Hide instructions after first scroll
  instructions.classList.add('hidden');
});

// Touch support
document.addEventListener('touchstart', (e) => {
  initAudio();
  state.mouseDown = true;
  state.mouseX = e.touches[0].clientX;
  state.mouseY = e.touches[0].clientY;
});

document.addEventListener('touchend', () => {
  state.mouseDown = false;
});

document.addEventListener('touchmove', (e) => {
  if (!state.mouseDown) return;
  
  const deltaX = e.touches[0].clientX - state.mouseX;
  const deltaY = e.touches[0].clientY - state.mouseY;
  
  state.camRotY += deltaX * 0.005;
  state.camRotX += deltaY * 0.003;
  state.camRotX = Math.max(-0.5, Math.min(1.2, state.camRotX));
  
  state.mouseX = e.touches[0].clientX;
  state.mouseY = e.touches[0].clientY;
});

// Click on car/scene to start audio
document.addEventListener('click', () => {
  initAudio();
  instructions.classList.add('hidden');
});

// ============================================
// CAMERA ANIMATION
// ============================================
let cameraAnimating = false;
let cameraAnimTarget = new THREE.Vector3();

function animateCameraTo(target) {
  cameraAnimating = true;
  cameraAnimTarget.copy(target);
}

function updateCameraAnimation() {
  if (!cameraAnimating) return;
  
  car.position.lerp(cameraAnimTarget, 0.03);
  
  if (car.position.distanceTo(cameraAnimTarget) < 1) {
    cameraAnimating = false;
  }
}

// ============================================
// PHYSICS & MOVEMENT UPDATE
// ============================================
function updateCarPhysics() {
  // Apply scroll-driven acceleration
  if (Math.abs(state.scrollDelta) > 0.1) {
    state.speed += state.scrollDelta * 0.008;
    state.scrollDelta *= 0.95; // Decay scroll
  }
  
  // Keyboard acceleration
  if (keys.forward) {
    state.speed += state.acceleration;
  }
  if (keys.backward) {
    state.speed -= state.braking;
  }
  
  // Steering
  if (keys.left) {
    state.steerAngle = Math.min(state.steerAngle + state.steerSpeed, state.maxSteer);
  } else if (keys.right) {
    state.steerAngle = Math.max(state.steerAngle - state.steerSpeed, -state.maxSteer);
  } else {
    state.steerAngle *= 0.9; // Return to center
  }
  
  // Apply friction
  if (!keys.forward && !keys.backward) {
    if (Math.abs(state.speed) > 0.001) {
      state.speed -= Math.sign(state.speed) * state.friction;
    } else {
      state.speed = 0;
    }
  }
  
  // Clamp speed
  state.speed = Math.max(-state.maxSpeed * 0.5, Math.min(state.maxSpeed, state.speed));
  
  // Apply movement
  const direction = new THREE.Vector3(
    Math.sin(state.steerAngle) * state.speed,
    0,
    -Math.cos(state.steerAngle) * state.speed
  );
  
  car.position.add(direction);
  
  // Apply steering rotation to car
  if (Math.abs(state.speed) > 0.01) {
    car.rotation.y += state.steerAngle * (state.speed / state.maxSpeed) * 0.5;
  }
  
  // Rotate wheels
  const wheelRotation = state.speed * 2;
  wheels.forEach(w => {
    w.rotation.x += wheelRotation;
  });
  
  // Keep car in bounds
  car.position.x = Math.max(-240, Math.min(240, car.position.x));
  car.position.z = Math.max(-240, Math.min(240, car.position.z));
}

// ============================================
// CAMERA UPDATE
// ============================================
function updateCamera() {
  const carDirection = new THREE.Vector3(
    Math.sin(car.rotation.y),
    0,
    Math.cos(car.rotation.y)
  );
  
  // Camera position: behind and above car, with mouse offset
  const baseOffset = state.cameraOffset.clone();
  baseOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), car.rotation.y + state.camRotY);
  
  const targetCamPos = car.position.clone().add(baseOffset);
  targetCamPos.y += state.camRotX * 5;
  
  camera.position.lerp(targetCamPos, 0.08);
  
  // Camera look target
  const lookTarget = car.position.clone();
  lookTarget.y += 1;
  lookTarget.add(state.cameraLookOffset.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), car.rotation.y + state.camRotY));
  
  camera.lookAt(lookTarget);
}

// ============================================
// LABEL PROJECTION
// ============================================
function updateLabels() {
  sectionLabels.forEach(({ el, worldPos }) => {
    const screenPos = worldPos.clone();
    screenPos.y += 10;
    screenPos.project(camera);
    
    const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;
    
    // Check if in front of camera
    if (screenPos.z < 1) {
      el.style.display = 'block';
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      
      // Distance-based styling
      const dist = car.position.distanceTo(worldPos);
      if (dist < 15) {
        el.classList.add('active');
        el.style.opacity = 1;
      } else {
        el.classList.remove('active');
        el.style.opacity = Math.max(0.4, 1 - (dist - 15) / 60).toString();
      }
    } else {
      el.style.display = 'none';
    }
  });
}

// ============================================
// UPDATE HUD
// ============================================
function updateHUD() {
  coordsEl.textContent = `X: ${Math.round(car.position.x)} | Z: ${Math.round(car.position.z)}`;
  
  const speedPercent = Math.abs(state.speed) / state.maxSpeed * 100;
  scrollFill.style.height = speedPercent + '%';
}

// ============================================
// ANIMATE LOOP
// ============================================
function animate() {
  requestAnimationFrame(animate);
  
  if (!state.loaded) return;
  
  updateCarPhysics();
  updateCameraAnimation();
  updateCamera();
  updateLabels();
  updateHUD();
  updateAudio();
  
  // Animate particles
  const positions = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3 + 1] += Math.sin(Date.now() * 0.001 + i) * 0.005;
  }
  particles.geometry.attributes.position.needsUpdate = true;
  particles.rotation.y += 0.0002;
  
  // Animate markers
  const time = Date.now() * 0.001;
  markers.forEach((m, i) => {
    m.orb.position.y = 8.5 + Math.sin(time + i) * 0.3;
    m.pillar.scale.y = 1 + Math.sin(time * 0.5 + i) * 0.05;
    m.sectionLight.intensity = 0.6 + Math.sin(time * 2 + i) * 0.2;
  });
  
  // Subtle car hover
  car.position.y = Math.sin(time * 3) * 0.02;
  
  renderer.render(scene, camera);
}

// ============================================
// WINDOW RESIZE
// ============================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================
// LOADING SEQUENCE
// ============================================
async function load() {
  const loadingSteps = [
    { progress: 20, delay: 300 },
    { progress: 45, delay: 400 },
    { progress: 70, delay: 350 },
    { progress: 90, delay: 300 },
    { progress: 100, delay: 500 }
  ];
  
  for (const step of loadingSteps) {
    loadingBar.style.width = step.progress + '%';
    loadingPercent.textContent = step.progress + '%';
    await new Promise(r => setTimeout(r, step.delay));
  }
  
  // Hide loading screen
  loadingScreen.classList.add('hidden');
  state.loaded = true;
  
  // Start audio on first interaction
  document.addEventListener('click', initAudio, { once: true });
  document.addEventListener('keydown', initAudio, { once: true });
}

// Start
load();
animate();
</script>
</body>
